{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-6 offset-md-3">
            <h2>➕ Cadastrar Usuário</h2>
            <hr>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Nome *</label>
                    <input type="text" class="form-control" name="nome" value="{{ valores.nome or '' }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">E-mail *</label>
                    <input type="email" class="form-control" name="email" value="{{ valores.email or '' }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Senha *</label>
                    <input type="password" class="form-control" name="senha" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Perfil</label>
                    <select class="form-control" name="perfil">
                        <option value="professor" {% if valores.perfil == 'professor' %}selected{% endif %}>Professor</option>
                        <option value="admin" {% if valores.perfil == 'admin' %}selected{% endif %}>Admin</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">💾 Salvar</button>
                <a href="/admin/usuarios" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
