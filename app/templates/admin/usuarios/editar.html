{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-6 offset-md-3">
            <h2>✏️ Editar Usuário</h2>
            <hr>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Nome *</label>
                    <input type="text" class="form-control" name="nome" value="{{ usuario.nome }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">E-mail *</label>
                    <input type="email" class="form-control" name="email" value="{{ usuario.email }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Nova Senha (deixe em branco para manter)</label>
                    <input type="password" class="form-control" name="senha" placeholder="****">
                </div>
                <div class="mb-3">
                    <label class="form-label">Perfil</label>
                    <select class="form-control" name="perfil">
                        <option value="professor" {% if usuario.perfil == 'professor' %}selected{% endif %}>Professor</option>
                        <option value="admin" {% if usuario.perfil == 'admin' %}selected{% endif %}>Admin</option>
                    </select>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" name="ativo" id="ativo" {% if usuario.ativo %}checked{% endif %}>
                    <label class="form-check-label" for="ativo">Usuário Ativo</label>
                </div>
                <button type="submit" class="btn btn-primary">💾 Salvar Alterações</button>
                <a href="/admin/usuarios" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
