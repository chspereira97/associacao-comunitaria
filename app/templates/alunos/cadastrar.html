{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <h2>📝 Cadastrar Novo Aluno</h2>
            <hr>
            
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Nome Completo *</label>
                    <input type="text" class="form-control" name="nome" value="{{ valores.nome or '' }}" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Data de Nascimento *</label>
                    <div class="row">
                        <div class="col-4">
                            <select class="form-control" name="dia" required>
                                <option value="">Dia</option>
                                {% for d in range(1, 32) %}
                                <option value="{{ d }}">{{ d }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-4">
                            <select class="form-control" name="mes" required>
                                <option value="">Mês</option>
                                <option value="1">Janeiro</option>
                                <option value="2">Fevereiro</option>
                                <option value="3">Março</option>
                                <option value="4">Abril</option>
                                <option value="5">Maio</option>
                                <option value="6">Junho</option>
                                <option value="7">Julho</option>
                                <option value="8">Agosto</option>
                                <option value="9">Setembro</option>
                                <option value="10">Outubro</option>
                                <option value="11">Novembro</option>
                                <option value="12">Dezembro</option>
                            </select>
                        </div>
                        <div class="col-4">
                            <input type="number" class="form-control" name="ano" placeholder="Ano" min="1990" max="2021" required>
                        </div>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Sexo</label>
                    <select class="form-control" name="sexo">
                        <option value="">Selecione...</option>
                        <option value="M" {% if valores.sexo == 'M' %}selected{% endif %}>Masculino</option>
                        <option value="F" {% if valores.sexo == 'F' %}selected{% endif %}>Feminino</option>
                    </select>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Telefone</label>
                    <input type="tel" class="form-control" name="telefone" 
                           placeholder="Apenas números (mín. 8 dígitos)"
                           pattern="[0-9]{8,}" inputmode="numeric"
                           title="Digite apenas números (mínimo 8 dígitos)"
                           oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                           value="{{ valores.telefone or '' }}">
                </div>
                
                <div class="mb-3">
                    <label class="form-label">E-mail</label>
                    <input type="email" class="form-control" name="email" value="{{ valores.email or '' }}">
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Endereço *</label>
                    <textarea class="form-control" name="endereco" rows="2" required>{{ valores.endereco or '' }}</textarea>
                    <small class="text-muted">Endereço completo (obrigatório, mínimo 10 caracteres)</small>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Observações</label>
                    <textarea class="form-control" name="observacoes" rows="3">{{ valores.observacoes or '' }}</textarea>
                </div>
                
                <button type="submit" class="btn btn-primary">💾 Salvar</button>
                <a href="/alunos" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
