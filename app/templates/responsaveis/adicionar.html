{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <h2>👤 Adicionar Responsável para {{ aluno.nome }}</h2>
            <hr>
            
            <div class="card mb-4">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">🔍 Buscar Responsável Existente</h5>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">CPF do Responsável</label>
                            <input type="text" class="form-control" name="cpf_busca" 
                                   placeholder="Apenas números (11 dígitos)"
                                   pattern="[0-9]{11}" inputmode="numeric" maxlength="11"
                                   title="Digite apenas os 11 números do CPF"
                                   oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                                   value="{{ cpf_preenchido or '' }}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Parentesco *</label>
                            <select class="form-control" name="parentesco" required>
                                <option value="">Selecione...</option>
                                <option value="Pai" {% if parentesco == 'Pai' %}selected{% endif %}>Pai</option>
                                <option value="Mãe" {% if parentesco == 'Mãe' %}selected{% endif %}>Mãe</option>
                                <option value="Avô" {% if parentesco == 'Avô' %}selected{% endif %}>Avô</option>
                                <option value="Avó" {% if parentesco == 'Avó' %}selected{% endif %}>Avó</option>
                                <option value="Tio" {% if parentesco == 'Tio' %}selected{% endif %}>Tio</option>
                                <option value="Tia" {% if parentesco == 'Tia' %}selected{% endif %}>Tia</option>
                                <option value="Irmão" {% if parentesco == 'Irmão' %}selected{% endif %}>Irmão</option>
                                <option value="Irmã" {% if parentesco == 'Irmã' %}selected{% endif %}>Irmã</option>
                                <option value="Responsável Legal" {% if parentesco == 'Responsável Legal' %}selected{% endif %}>Responsável Legal</option>
                                <option value="Outro" {% if parentesco == 'Outro' %}selected{% endif %}>Outro</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary">🔍 Buscar e Vincular</button>
                        <a href="/alunos/{{ aluno.id }}/responsaveis" class="btn btn-secondary">Cancelar</a>
                    </form>
                </div>
            </div>
            
            <div class="card">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0">➕ Cadastrar Novo Responsável</h5>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <input type="hidden" name="novo_responsavel" value="1">
                        <div class="mb-3">
                            <label class="form-label">Nome Completo *</label>
                            <input type="text" class="form-control" name="nome" value="{{ valores.nome or '' }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Parentesco *</label>
                            <select class="form-control" name="parentesco" required>
                                <option value="">Selecione...</option>
                                <option value="Pai">Pai</option>
                                <option value="Mãe">Mãe</option>
                                <option value="Avô">Avô</option>
                                <option value="Avó">Avó</option>
                                <option value="Tio">Tio</option>
                                <option value="Tia">Tia</option>
                                <option value="Irmão">Irmão</option>
                                <option value="Irmã">Irmã</option>
                                <option value="Responsável Legal">Responsável Legal</option>
                                <option value="Outro">Outro</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Telefone Principal *</label>
                            <input type="tel" class="form-control" name="telefone_principal" 
                                   placeholder="Apenas números (mín. 8 dígitos)"
                                   pattern="[0-9]{8,}" inputmode="numeric"
                                   title="Digite apenas números (mínimo 8 dígitos)"
                                   oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                                   value="{{ valores.telefone_principal or '' }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Telefone Secundário</label>
                            <input type="tel" class="form-control" name="telefone_secundario" 
                                   placeholder="Apenas números (mín. 8 dígitos)"
                                   pattern="[0-9]{8,}" inputmode="numeric"
                                   title="Digite apenas números (mínimo 8 dígitos)"
                                   oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                                   value="{{ valores.telefone_secundario or '' }}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">E-mail</label>
                            <input type="email" class="form-control" name="email" value="{{ valores.email or '' }}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">CPF</label>
                            <input type="text" class="form-control" name="cpf" 
                                   placeholder="Apenas números (11 dígitos)"
                                   pattern="[0-9]{11}" inputmode="numeric" maxlength="11"
                                   title="Digite apenas os 11 números do CPF"
                                   oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                                   value="{{ valores.cpf or cpf_preenchido or '' }}">
                        </div>
                        <button type="submit" class="btn btn-success">💾 Cadastrar e Vincular</button>
                        <a href="/alunos/{{ aluno.id }}/responsaveis" class="btn btn-secondary">Cancelar</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
