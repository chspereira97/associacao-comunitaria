{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <h2>✏️ Editar Responsável: {{ responsavel.nome }}</h2>
            <hr>
            
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Nome Completo *</label>
                    <input type="text" class="form-control" name="nome" value="{{ responsavel.nome }}" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Telefone Principal *</label>
                    <input type="tel" class="form-control" name="telefone_principal" 
                           placeholder="Apenas números (mín. 8 dígitos)"
                           pattern="[0-9]{8,}" inputmode="numeric"
                           title="Digite apenas números (mínimo 8 dígitos)"
                           oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                           value="{{ responsavel.telefone_principal }}" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Telefone Secundário</label>
                    <input type="tel" class="form-control" name="telefone_secundario" 
                           placeholder="Apenas números (mín. 8 dígitos)"
                           pattern="[0-9]{8,}" inputmode="numeric"
                           title="Digite apenas números (mínimo 8 dígitos)"
                           oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                           value="{{ responsavel.telefone_secundario or '' }}">
                </div>
                
                <div class="mb-3">
                    <label class="form-label">E-mail</label>
                    <input type="email" class="form-control" name="email" value="{{ responsavel.email or '' }}">
                </div>
                
                <div class="mb-3">
                    <label class="form-label">CPF</label>
                    <input type="text" class="form-control" name="cpf" 
                           placeholder="Apenas números (11 dígitos)"
                           pattern="[0-9]{11}" inputmode="numeric" maxlength="11"
                           title="Digite apenas os 11 números do CPF"
                           oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                           value="{{ responsavel.cpf or '' }}">
                    <small class="text-muted">CPF é opcional, mas ajuda a evitar duplicidade</small>
                </div>
                
                <button type="submit" class="btn btn-primary">💾 Salvar Alterações</button>
                <a href="/alunos" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
